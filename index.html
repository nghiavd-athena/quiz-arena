<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Arena</title>
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <!-- ── Start Screen ─────────────────────────────────────────────────── -->
    <section id="start-screen" class="screen active">
      <div class="card start-card">
        <div class="logo">
          <span class="logo-icon">⚡</span>
          <h1>Quiz Arena</h1>
          <p class="tagline">Test your knowledge. Beat the clock. Climb the board.</p>
        </div>

        <div class="form-group">
          <label for="player-name">Your Name</label>
          <input
            type="text"
            id="player-name"
            placeholder="Enter your name…"
            maxlength="20"
            autocomplete="off"
          />
        </div>

        <div class="form-group">
          <label>Category</label>
          <div class="option-grid" id="category-grid">
            <!-- Populated by app.js -->
          </div>
        </div>

        <div class="form-group">
          <label>Difficulty</label>
          <div class="option-grid" id="difficulty-grid">
            <!-- Populated by app.js -->
          </div>
        </div>

        <button class="btn btn-primary btn-lg" id="start-btn">Start Game</button>
        <button class="btn btn-ghost" id="view-leaderboard-btn">🏆 View Leaderboard</button>
      </div>
    </section>

    <!-- ── Game Screen ──────────────────────────────────────────────────── -->
    <section id="game-screen" class="screen">
      <div class="game-header">
        <div class="progress-info">
          <span id="question-counter">Question 1 of 10</span>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progress-fill"></div>
          </div>
        </div>

        <div class="streak-badge" id="streak-badge">
          <span class="streak-fire">🔥</span>
          <span id="streak-count">0</span>
          <span id="streak-multiplier" class="multiplier"></span>
        </div>

        <div class="score-display">
          <span class="score-label">Score</span>
          <span id="score-value">0</span>
        </div>
      </div>

      <div class="timer-section">
        <div class="timer-track">
          <div class="timer-fill" id="timer-fill"></div>
        </div>
        <div class="timer-number" id="timer-number">15</div>
      </div>

      <div class="card question-card" id="question-card">
        <div class="question-category" id="question-category"></div>
        <p class="question-text" id="question-text">Loading question…</p>

        <div class="answers-grid" id="answers-grid">
          <button class="btn btn-answer" data-index="0"></button>
          <button class="btn btn-answer" data-index="1"></button>
          <button class="btn btn-answer" data-index="2"></button>
          <button class="btn btn-answer" data-index="3"></button>
        </div>
      </div>
    </section>

    <!-- ── Results Screen ───────────────────────────────────────────────── -->
    <section id="results-screen" class="screen">
      <div class="card results-card">
        <div class="results-header">
          <div class="results-trophy" id="results-trophy">🏆</div>
          <h2 id="results-title">Game Over!</h2>
          <p id="results-subtitle"></p>
        </div>

        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-value" id="stat-score">0</div>
            <div class="stat-label">Score</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="stat-accuracy">0%</div>
            <div class="stat-label">Accuracy</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="stat-time">0s</div>
            <div class="stat-label">Time Taken</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="stat-streak">0</div>
            <div class="stat-label">Best Streak</div>
          </div>
        </div>

        <div class="results-actions">
          <button class="btn btn-primary btn-lg" id="play-again-btn">Play Again</button>
          <button class="btn btn-secondary" id="results-review-btn">📋 Review Answers</button>
          <button class="btn btn-ghost" id="results-leaderboard-btn">🏆 Leaderboard</button>
        </div>
      </div>

      <!-- Confetti canvas -->
      <canvas id="confetti-canvas"></canvas>
    </section>

    <!-- ── Review Screen ─────────────────────────────────────────────────── -->
    <section id="review-screen" class="screen">
      <div class="review-container">
        <div class="review-header">
          <h2 class="review-title">Answer Review</h2>
          <p id="review-subtitle"></p>
        </div>
        <div id="review-list" class="review-list"></div>
        <div class="review-actions">
          <button class="btn btn-primary btn-lg" id="review-back-btn">Back to Results</button>
          <button class="btn btn-ghost" id="review-play-again-btn">Play Again</button>
        </div>
      </div>
    </section>

    <!-- ── Leaderboard Screen ───────────────────────────────────────────── -->
    <section id="leaderboard-screen" class="screen">
      <div class="card leaderboard-card">
        <h2 class="leaderboard-title">🏆 Hall of Fame</h2>
        <div id="leaderboard-list" class="leaderboard-list">
          <!-- Populated by app.js -->
        </div>
        <div class="leaderboard-actions">
          <button class="btn btn-primary" id="lb-back-btn">Back</button>
          <button class="btn btn-ghost btn-sm" id="lb-clear-btn">Clear Scores</button>
        </div>
      </div>
    </section>

    <script src="src/logic.js"></script>
    <script src="src/app.js"></script>
  </body>
</html>
